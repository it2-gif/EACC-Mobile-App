name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Build web
        env:
          EACC_FCM_VAPID_KEY: ${{ secrets.EACC_FCM_VAPID_KEY }}
        run: >
          flutter build web --release
          --base-href "/${{ github.event.repository.name }}/"
          --pwa-strategy=none
          --dart-define=EACC_API_BASE_URL=https://eacc-mobile-app-production.up.railway.app
          --dart-define=EACC_FCM_VAPID_KEY=${EACC_FCM_VAPID_KEY}

      - name: Add SPA fallback
        run: |
          cp build/web/index.html build/web/404.html
          touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

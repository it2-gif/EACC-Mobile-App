<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="description"
    content="Secure EACC course messaging for students and teachers."
  >

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EACC Chat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>EACC Chat</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f5f7fb;
      color: #17233b;
      font-family: Arial, sans-serif;
    }

    #app-loader {
      box-sizing: border-box;
      display: grid;
      min-height: 100%;
      place-items: center;
      padding: 24px;
      text-align: center;
      transition: opacity 180ms ease;
    }

    #app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-mark {
      width: 44px;
      height: 44px;
      margin: 0 auto 18px;
      border: 4px solid #dbe6f5;
      border-top-color: #1767b2;
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }

    #app-loader h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    #app-loader p {
      max-width: 420px;
      margin: 0;
      color: #64748b;
      line-height: 1.5;
    }

    #app-loader.failed .loader-mark {
      display: none;
    }

    #app-loader.failed h1 {
      color: #b42318;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" role="status" aria-live="polite">
    <div>
      <div class="loader-mark" aria-hidden="true"></div>
      <h1>Opening EACC Chat</h1>
      <p id="app-loader-message">Preparing your secure course messages...</p>
    </div>
  </div>

  <script>
    const loader = document.getElementById('app-loader');
    const loaderMessage = document.getElementById('app-loader-message');
    let startupFinished = false;

    window.addEventListener('flutter-first-frame', () => {
      startupFinished = true;
      loader.classList.add('hidden');
      window.setTimeout(() => loader.remove(), 200);
    });

    function showStartupError(message) {
      if (startupFinished || !document.body.contains(loader)) {
        return;
      }

      loader.classList.add('failed');
      loader.querySelector('h1').textContent = 'EACC Chat could not start';
      loaderMessage.textContent = message;
    }

    window.addEventListener('error', (event) => {
      console.error('EACC Chat startup error:', event.error || event.message);
      showStartupError(
        'The app encountered a startup error. Refresh the page and try again.'
      );
    });

    window.addEventListener('unhandledrejection', (event) => {
      console.error('EACC Chat startup rejection:', event.reason);
      showStartupError(
        'A required service did not initialize. Refresh the page and try again.'
      );
    });

    window.setTimeout(() => {
      showStartupError(
        'Starting the app is taking longer than expected. Check your connection, then refresh.'
      );
    }, 30000);

    (function registerFirebaseServiceWorker() {
      if (!('serviceWorker' in navigator)) {
        return;
      }

      const base = document.querySelector('base')?.getAttribute('href') || '/';
      navigator.serviceWorker
        .register(`${base}firebase-messaging-sw.js`, { scope: base })
        .catch((error) => {
          console.warn('FCM service worker registration failed:', error);
        });
    })();
  </script>

  <!-- Attach startup listeners before loading Flutter's asynchronous boot file. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

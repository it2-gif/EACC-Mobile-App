<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="description"
    content="Secure EACC course messaging for students and teachers."
  >

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="EACC Chat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>EACC Chat</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f5f7fb;
      color: #17233b;
      font-family: Arial, sans-serif;
    }

    #app-loader {
      box-sizing: border-box;
      display: grid;
      min-height: 100%;
      place-items: center;
      padding: 24px;
      text-align: center;
      transition: opacity 180ms ease;
    }

    #app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-mark {
      width: 44px;
      height: 44px;
      margin: 0 auto 18px;
      border: 4px solid #dbe6f5;
      border-top-color: #1767b2;
      border-radius: 50%;
      animation: spin 700ms linear infinite;
    }

    #app-loader h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    #app-loader p {
      max-width: 420px;
      margin: 0;
      color: #64748b;
      line-height: 1.5;
    }

    #app-loader.failed .loader-mark {
      display: none;
    }

    #app-loader.failed h1 {
      color: #b42318;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" role="status" aria-live="polite">
    <div>
      <div class="loader-mark" aria-hidden="true"></div>
      <h1>Opening EACC Chat</h1>
      <p id="app-loader-message">Preparing your secure course messages...</p>
    </div>
  </div>

  <script>
    const appLoader = document.getElementById('app-loader');
    const loaderMessage = document.getElementById('app-loader-message');
    let startupFinished = false;
    let startupTimeoutId = null;

    window.addEventListener('flutter-first-frame', () => {
      startupFinished = true;
      if (startupTimeoutId !== null) {
        window.clearTimeout(startupTimeoutId);
        startupTimeoutId = null;
      }
      appLoader.classList.add('hidden');
      window.setTimeout(() => appLoader.remove(), 200);
    });

    function showStartupError(message) {
      if (startupFinished || !document.body.contains(appLoader)) {
        return;
      }

      appLoader.classList.add('failed');
      appLoader.querySelector('h1').textContent = 'EACC Chat could not start';
      loaderMessage.textContent = message;
    }

    window.addEventListener('error', (event) => {
      console.error('EACC Chat startup error:', event.error || event.message);
      showStartupError(
        'The app encountered a startup error. Refresh the page and try again.'
      );
    });

    window.addEventListener('unhandledrejection', (event) => {
      console.error('EACC Chat startup rejection:', event.reason);
      showStartupError(
        'A required service did not initialize. Refresh the page and try again.'
      );
    });

    startupTimeoutId = window.setTimeout(() => {
      showStartupError(
        'Starting the app is taking longer than expected. Please wait a bit longer, then refresh.'
      );
    }, 120000);

    function eaccAppBaseHref() {
      return document.querySelector('base')?.getAttribute('href') || '/';
    }

    function eaccAbsoluteUrl(path) {
      return new URL(path, window.location.origin).href;
    }

    (function registerFirebaseServiceWorker() {
      if (!('serviceWorker' in navigator)) {
        return;
      }

      const base = eaccAppBaseHref();
      const workerUrl = eaccAbsoluteUrl(`${base}firebase-messaging-sw.js`);
      const scopeUrl = eaccAbsoluteUrl(base);
      navigator.serviceWorker
        .register(workerUrl, { scope: scopeUrl })
        .then(() => {
          console.debug('EACC FCM service worker registered:', workerUrl);
        })
        .catch((error) => {
          console.warn('FCM service worker registration failed:', error);
        });
    })();

    (function configureFirebaseMessagingBridge() {
      if (!window.firebase || !('serviceWorker' in navigator)) {
        return;
      }

      const firebaseConfig = {
        apiKey: 'AIzaSyBZKeyhvuYUlBcdqylVIexJOZdQ7-S4lFI',
        authDomain: 'eacc-mobile-app.firebaseapp.com',
        projectId: 'eacc-mobile-app',
        storageBucket: 'eacc-mobile-app.firebasestorage.app',
        messagingSenderId: '492936842220',
        appId: '1:492936842220:web:de1c69381e413074c34ec9',
        measurementId: 'G-S9GL3J0R9H',
      };

      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }

      window.eaccGetFcmToken = async function(vapidKey) {
        if (!vapidKey) {
          console.warn('EACC FCM VAPID key is missing.');
          return null;
        }

        const base = eaccAppBaseHref();
        const workerUrl = eaccAbsoluteUrl(`${base}firebase-messaging-sw.js`);
        const scopeUrl = eaccAbsoluteUrl(base);
        const registration =
          (await navigator.serviceWorker.getRegistration(scopeUrl)) ||
          (await navigator.serviceWorker.register(workerUrl, {
            scope: scopeUrl,
          }));

        const token = await firebase.messaging().getToken({
          vapidKey,
          serviceWorkerRegistration: registration,
        });
        console.debug(
          token
            ? 'EACC FCM web token created.'
            : 'EACC FCM web token was empty.'
        );
        return token;
      };

      window.eaccShowBrowserNotification = async function(
        title,
        body,
        courseId,
        threadId,
        studentName,
        senderName
      ) {
        if (Notification.permission !== 'granted') {
          console.debug(
            'EACC browser notification skipped: permission is',
            Notification.permission
          );
          return false;
        }

        const base = eaccAppBaseHref();
        const workerUrl = eaccAbsoluteUrl(`${base}firebase-messaging-sw.js`);
        const scopeUrl = eaccAbsoluteUrl(base);
        const registration =
          (await navigator.serviceWorker.getRegistration(scopeUrl)) ||
          (await navigator.serviceWorker.register(workerUrl, {
            scope: scopeUrl,
          }));

        await registration.showNotification(title || 'EACC Chat', {
          body: body || 'New message',
          data: {
            courseId: courseId || '',
            threadId: threadId || '',
            studentName: studentName || '',
            senderName: senderName || '',
          },
          icon: `${base}icons/Icon-192.png`,
          badge: `${base}icons/Icon-192.png`,
        });
        return true;
      };
    })();

    // Synthesize a soft two-note notification chime via Web Audio API.
    // Called from Flutter when a foreground push-notification banner appears.
    function playNotificationTone() {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        const ctx = new Ctx();

        function chime(freq, startTime, duration, peakVol) {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, startTime);
          gain.gain.setValueAtTime(0, startTime);
          gain.gain.linearRampToValueAtTime(peakVol, startTime + 0.018);
          gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
          osc.start(startTime);
          osc.stop(startTime + duration + 0.01);
        }

        const t = ctx.currentTime;
        chime(880,    t,        0.28, 0.30);   // A5  — first note
        chime(1318.5, t + 0.13, 0.32, 0.22);   // E6  — second note (higher)

        setTimeout(() => ctx.close(), 1200);
      } catch (_) {
        // Web Audio not available — silent fallback.
      }
    }
  </script>

  <!-- Attach startup listeners before loading Flutter's asynchronous boot file. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
